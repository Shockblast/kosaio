name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/engine/py
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install pytest
        run: pip install pytest
      - name: Run tests
        run: python -m pytest -v --tb=short

  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install shellcheck
        run: |
          # GitHub-hosted runners pre-install third-party repos (Google
          # Chrome, VS Code, MS) whose mirrors occasionally fail with
          # "Mirror sync in progress" — irrelevant for shellcheck. Drop
          # them before apt-get update to keep the index step stable.
          sudo find /etc/apt/sources.list.d -type f \
            \( -name 'google-chrome.list' -o -name 'vscode.list' -o -name 'microsoft-prod.list' \) \
            -delete
          sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck on core scripts
        run: |
          shellcheck -x scripts/kosaio
          shellcheck -x scripts/common/*.sh
          shellcheck -x scripts/engine/driver_manager.sh
          shellcheck -x scripts/controllers/*.sh
