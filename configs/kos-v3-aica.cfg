# Custom kos-chain settings, change settings if you need.
# if you need documentation for settings, you can find the original file here:
# https://github.com/KallistiOS/KallistiOS/blob/master/utils/kos-chain/Makefile.aica.cfg

platform=aica
toolchain_profile=stable
download_protocol=https
#force_downloader=wget
#gnu_mirror=mirrors.kernel.org
toolchain_path=/opt/toolchains/dc/arm-eabi
makejobs= # Empty for use all available cores, 1 or more to set limit.
verbose=0 # default is 1
erase=1
#toolchain_debug=1
enable_cpp=0
enable_objc=0
enable_objcpp=0
#enable_d=1
#enable_ada=1
#enable_rust=1
#enable_libgccjit=1
thread_model=single
#use_kos_patches=0
disable_nls=0 # default is 1
auto_fixup_newlib=0
newlib_c99_formats=1
#newlib_multibyte=1
#newlib_iconv_encodings=us_ascii,utf8,utf16,ucs_2_internal,ucs_4_internal
newlib_opt_space=1 # default is 0?
#libstdcxx_tzdb=1
#standalone_binary=1
#sh_force_libbfd_installation=1
