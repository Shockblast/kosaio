# === METADATA ===
KOSAIO_TOOL_ID="mame"
KOSAIO_TOOL_NAME="MAME (Dreamcast)"
KOSAIO_TOOL_DESC="Multi-purpose emulation framework (configured for Dreamcast)"
KOSAIO_TOOL_TAGS=("emulator" "testing" "graphics")
KOSAIO_TOOL_TYPE=("emulator")
KOSAIO_TOOL_DEPS=("libsdl2-dev" "libsdl2-ttf-dev" "libfontconfig-dev" "qtbase5-dev" "build-essential" "python3" "python3-pip" "git" "libpulse-dev" "libasound2-dev")

# === SOURCE CONTROL ===
KOSAIO_TOOL_REPO="https://github.com/mamedev/mame.git"
KOSAIO_TOOL_BRANCH="mame0285"

# === BUILD OPTIONS ===
KOSAIO_TOOL_BUILD_SYSTEM="make"
KOSAIO_TOOL_BUILD_DIR=""
KOSAIO_TOOL_BUILD_SUBDIR="."
KOSAIO_TOOL_BUILD_TARGET=""
KOSAIO_TOOL_TOOLCHAIN=""
KOSAIO_TOOL_PREBUILD_FUNC="kosaio_translate_mame_args"
KOSAIO_TOOL_ARGS=()

# === INSTALLATION ===
KOSAIO_TOOL_INSTALL_METHOD="none"
KOSAIO_TOOL_BINARIES=("mame")
KOSAIO_TOOL_BINARY_SUBDIR="."
KOSAIO_TOOL_INSTALLATION_FOLDER=""
KOSAIO_TOOL_INSTALLATION_LIBDIR=""
KOSAIO_TOOL_INSTALLATION_INCLUDEDIR=""

# === PATCHES ===
KOSAIO_TOOL_PATCHES=()

# === UNINSTALL & HEALTH ===
KOSAIO_TOOL_CAN_MAKE_CLEAN=true
KOSAIO_TOOL_LIBS=(
    "${KOSAIO_DIR}/tools/mame/mame"
)
KOSAIO_TOOL_INCLUDE_DIRS=()

# === RICH MESSAGING ===
KOSAIO_TOOL_INSTALL_CONFIRM=false
KOSAIO_TOOL_POSTINSTALL_MESSAGE=""
KOSAIO_TOOL_BUILD_WARNING=(
    "MASSIVE COMPILATION"
    "MAME requires significant RAM and CPU time."
    "Memory-aware compilation will auto-limit build threads."
)
KOSAIO_TOOL_INSTALL_WARNING=()
KOSAIO_TOOL_INFO_EXTRA=(
    "${C_YELLOW}Usage:${C_RESET}   ${C_CYAN}kosaio build mame${C_RESET}"
    "${C_YELLOW}Flags:${C_RESET}   ${C_CYAN}--full-power${C_RESET} : Use all CPU cores (may swap)"
    "            ${C_CYAN}--debug${C_RESET}      : Build with debug symbols"
)
