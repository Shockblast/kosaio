# === METADATA ===
KOSAIO_TOOL_ID="flycast"
KOSAIO_TOOL_NAME="Flycast"
KOSAIO_TOOL_DESC="High-performance Dreamcast emulator with Vulkan support"
KOSAIO_TOOL_TAGS=("emulator" "testing" "graphics" "vulkan" "opengl" "gdb")
KOSAIO_TOOL_TYPE=("emulator")
KOSAIO_TOOL_DEPS=("libvulkan-dev" "libsdl2-dev" "cmake" "build-essential")

# === SOURCE CONTROL ===
KOSAIO_TOOL_REPO="https://github.com/flyinghead/flycast.git"
KOSAIO_TOOL_BRANCH=""
KOSAIO_TOOL_CLONE_RECURSIVE=true

# === BUILD OPTIONS ===
KOSAIO_TOOL_BUILD_SYSTEM="cmake"
KOSAIO_TOOL_BUILD_DIR="build"
KOSAIO_TOOL_BUILD_SUBDIR=""
KOSAIO_TOOL_TOOLCHAIN=""
KOSAIO_TOOL_PREBUILD_FUNC="kosaio_translate_flycast_args cmake"
KOSAIO_TOOL_ARGS=()

# === INSTALLATION ===
KOSAIO_TOOL_INSTALL_METHOD="cp"
KOSAIO_TOOL_BINARIES=("flycast")
KOSAIO_TOOL_BINARY_SUBDIR="build"
KOSAIO_TOOL_INSTALLATION_FOLDER="${PROJECTS_DIR}/flycast"
KOSAIO_TOOL_INSTALLATION_LIBDIR=""
KOSAIO_TOOL_INSTALLATION_INCLUDEDIR=""

# === PATCHES ===
KOSAIO_TOOL_PATCHES=()

# === UNINSTALL & HEALTH ===
KOSAIO_TOOL_LIBS=(
    "${PROJECTS_DIR}/flycast/flycast"
)
KOSAIO_TOOL_INCLUDE_DIRS=()

# === RICH MESSAGING ===
KOSAIO_TOOL_INSTALL_CONFIRM=false
KOSAIO_TOOL_POSTINSTALL_MESSAGE=""
KOSAIO_TOOL_BUILD_WARNING=()
KOSAIO_TOOL_INSTALL_WARNING=()
KOSAIO_TOOL_INFO_EXTRA=(
    "${C_YELLOW}Flags:${C_RESET}   ${C_CYAN}--with-gdb${C_RESET} : Enable GDB Server for debugging"
)
