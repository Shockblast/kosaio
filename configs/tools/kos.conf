KOSAIO_TOOL_LIBS=(
    "${KOS_DIR}/lib/dreamcast/libkallisti.a"
)
KOSAIO_TOOL_INCLUDE_DIRS=(
    "${KOS_DIR}/include"
)

# === RICH MESSAGING ===
KOSAIO_TOOL_INSTALL_CONFIRM=false
KOSAIO_TOOL_POSTINSTALL_MESSAGE="You must reload your shell to apply the new KOS environment variables. Run: ${C_B_CYAN}reload${C_RESET}"
