# === METADATA ===
KOSAIO_TOOL_ID="kos"
KOSAIO_TOOL_NAME="KallistiOS"
KOSAIO_TOOL_DESC="The main open-source SDK for the Sega Dreamcast (Libraries & SDK Core)."
KOSAIO_TOOL_TAGS=("core" "sdk" "kallistios" "os")
KOSAIO_TOOL_TYPE=("core")
KOSAIO_TOOL_DEPS=()

# === SOURCE CONTROL ===
KOSAIO_TOOL_REPO="https://github.com/KallistiOS/KallistiOS.git"
