# === METADATA ===
KOSAIO_TOOL_ID="sdl2"
KOSAIO_TOOL_NAME="SDL2"
KOSAIO_TOOL_DESC="Simple DirectMedia Layer 2 - cross-platform multimedia library"
KOSAIO_TOOL_TAGS=("sdl" "sdl2" "multimedia" "video" "audio" "library")
KOSAIO_TOOL_TYPE=("lib")
KOSAIO_TOOL_DEPS=("build-essential" "git")

# === SOURCE CONTROL ===
KOSAIO_TOOL_REPO="https://github.com/libsdl-org/SDL.git"
KOSAIO_TOOL_BRANCH="SDL2"

# === BUILD OPTIONS ===
KOSAIO_TOOL_BUILD_SYSTEM="configure"
KOSAIO_TOOL_BUILD_DIR=""
KOSAIO_TOOL_BUILD_SUBDIR="."
KOSAIO_TOOL_TOOLCHAIN=""
KOSAIO_TOOL_PREBUILD_FUNC="kosaio_translate_sdl_args configure"
KOSAIO_TOOL_ARGS=()

# === INSTALLATION ===
KOSAIO_TOOL_INSTALL_METHOD="make_install"
KOSAIO_TOOL_BINARIES=()
KOSAIO_TOOL_BINARY_SUBDIR=""
KOSAIO_TOOL_CAN_MAKE_UNINSTALL=true
KOSAIO_TOOL_MAKE_ARGS=()
KOSAIO_TOOL_INSTALLATION_FOLDER="/usr/local"
KOSAIO_TOOL_INSTALLATION_LIBDIR="lib"
KOSAIO_TOOL_INSTALLATION_INCLUDEDIR="include"

# === PATCHES ===
KOSAIO_TOOL_PATCHES=()

# === UNINSTALL & HEALTH ===
KOSAIO_TOOL_LIBS=(
    "/usr/local/lib/pkgconfig/sdl2.pc"
    "/usr/local/bin/sdl2-config"
)
KOSAIO_TOOL_INCLUDE_DIRS=(
    "/usr/local/include/SDL2"
    "/usr/local/lib/cmake/SDL2"
)

# === RICH MESSAGING ===
KOSAIO_TOOL_INSTALL_CONFIRM=true
KOSAIO_TOOL_POSTINSTALL_MESSAGE=""
KOSAIO_TOOL_BUILD_WARNING=()
KOSAIO_TOOL_INSTALL_WARNING=(
    "CUSTOMIZABLE BUILD"
    "${C_YELLOW}Tip:${C_RESET} Run ${C_CYAN}kosaio info sdl2${C_RESET} for available build flags."
    "Proceeding will use standard defaults."
)
KOSAIO_TOOL_INFO_EXTRA=(
    "${C_YELLOW}Usage:${C_RESET}   Add ${C_CYAN}-lSDL2${C_RESET} to your Makefile."
    "${C_YELLOW}Flags:${C_RESET}   ${C_CYAN}--no-audio${C_RESET}, ${C_CYAN}--no-joystick${C_RESET}, ${C_CYAN}--no-opengl${C_RESET},"
    "             ${C_CYAN}--no-haptic${C_RESET}, ${C_CYAN}--no-pthreads${C_RESET}, ${C_CYAN}--no-timers${C_RESET},"
    "             ${C_CYAN}--no-events${C_RESET}, ${C_CYAN}--no-render${C_RESET}, ${C_CYAN}--no-tests${C_RESET},"
    "             ${C_CYAN}--static${C_RESET}"
)
