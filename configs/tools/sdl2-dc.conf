# === METADATA ===
KOSAIO_TOOL_ID="sdl2-dc"
KOSAIO_TOOL_NAME="SDL2-DC"
KOSAIO_TOOL_DESC="SDL2 port for Dreamcast by GPF"
KOSAIO_TOOL_TAGS=("sdl" "sdl2" "dreamcast" "gpf" "library" "video" "audio")
KOSAIO_TOOL_TYPE=("lib")
KOSAIO_TOOL_DEPS=("build-essential" "git" "cmake")

# === SOURCE CONTROL ===
KOSAIO_TOOL_REPO="https://github.com/GPF/SDL.git"
KOSAIO_TOOL_BRANCH="dreamcastSDL2"

# === BUILD OPTIONS ===
KOSAIO_TOOL_BUILD_SYSTEM="cmake"
KOSAIO_TOOL_BUILD_DIR="dcbuild"
KOSAIO_TOOL_BUILD_SUBDIR=""
KOSAIO_TOOL_TOOLCHAIN=""
KOSAIO_TOOL_PREBUILD_FUNC="kosaio_translate_sdl_args cmake"
KOSAIO_TOOL_ARGS=(
    "-DSDL_OPENGL=ON"
    "-DSDL_HAPTIC=ON"
    "-DSDL_TESTS=OFF"
    "-DSDL_PTHREADS=ON"
    "-DSDL_TIMER_UNIX=ON"
)

# === INSTALLATION ===
KOSAIO_TOOL_INSTALL_METHOD="make_install"
KOSAIO_TOOL_BINARIES=()
KOSAIO_TOOL_BINARY_SUBDIR=""
KOSAIO_TOOL_INSTALLATION_FOLDER="${KOS_BASE}/addons"
KOSAIO_TOOL_INSTALLATION_LIBDIR="lib/dreamcast"
KOSAIO_TOOL_INSTALLATION_INCLUDEDIR="include/"

# === COMPILER/LINKER FLAGS ===
# KOSAIO_TOOL_FLAGS=("-O2" "-ffast-math")

# === CONTAINER ENVIRONMENT ===
# KOSAIO_TOOL_ENV=("KOS_BASE=/opt/kos" "KOS_PORTS=/opt/kos/ports")

# === PATCHES ===
KOSAIO_TOOL_PATCHES=()

# === UNINSTALL & HEALTH ===
KOSAIO_TOOL_LIBS=(
    "${KOS_BASE}/addons/lib/dreamcast/libSDL2.a"
    "${KOS_BASE}/addons/lib/dreamcast/libSDL2main.a"
)
KOSAIO_TOOL_INCLUDE_DIRS=(
    "${KOS_BASE}/addons/include/SDL2"
)

# === RICH MESSAGING ===
KOSAIO_TOOL_INSTALL_CONFIRM=true
KOSAIO_TOOL_POSTINSTALL_MESSAGE=""
KOSAIO_TOOL_BUILD_WARNING=()
KOSAIO_TOOL_INSTALL_WARNING=(
    "CUSTOMIZABLE BUILD"
    "${C_YELLOW}Tip:${C_RESET} Run ${C_CYAN}kosaio info sdl2-dc${C_RESET} for available build flags."
    "Proceeding will use standard defaults."
)
KOSAIO_TOOL_INFO_EXTRA=(
    "${C_YELLOW}Context:${C_RESET} SDL2 port for Dreamcast by GPF."
    "${C_YELLOW}Usage:${C_RESET}   Add ${C_CYAN}-lSDL2${C_RESET} to your Makefile."
    "${C_YELLOW}Flags:${C_RESET}   ${C_CYAN}--no-audio${C_RESET}, ${C_CYAN}--no-joystick${C_RESET}, ${C_CYAN}--no-opengl${C_RESET},"
    "             ${C_CYAN}--no-haptic${C_RESET}, ${C_CYAN}--no-pthreads${C_RESET}, ${C_CYAN}--no-timers${C_RESET},"
    "             ${C_CYAN}--no-events${C_RESET}, ${C_CYAN}--no-render${C_RESET}, ${C_CYAN}--no-tests${C_RESET},"
    "             ${C_CYAN}--static${C_RESET}, ${C_CYAN}--gpf-settings${C_RESET}"
)
